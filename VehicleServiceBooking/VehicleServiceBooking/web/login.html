<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>



<div class="auth-page">


<div class="auth-card">


<h2>
Customer Login
</h2>


<p class="subtitle">
Access your vehicle service account
</p>



<form action="LoginServlet" method="post">


<label>Email</label>

<input type="email"
       name="email"
       placeholder="Enter Email"
       required>



<label>Password</label>

<input type="password"
       name="password"
       placeholder="Enter Password"
       required>



<button type="submit" class="auth-btn">

Login

</button>



</form>



<p class="auth-link">

Don't have an account?

<a href="register.html">
Register
</a>

</p>



</div>


</div>



<script src="js/script.js"></script>


</body>

</html>
